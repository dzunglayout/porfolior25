name: Weekly Blog Agent
on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cấp quyền ghi cụ thể ở đây
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Cập nhật lên v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Cập nhật lên v5
        with:
          python-version: '3.10'

      - name: Install Gemini Library
        run: pip install google-generativeai

      - name: Run Agent Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_blog.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add _drafts/
          # Chỉ commit nếu có sự thay đổi, tránh lỗi khi không có file mới
          git diff --quiet && git diff --staged --quiet || git commit -m "New weekly draft post"
          git push
