name: Weekly Blog Agent
on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cấp quyền ghi cụ thể ở đây
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Cập nhật lên v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Nâng cấp lên 3.11 theo yêu cầu của Google

      - name: Install New Gemini Library
        run: |
          python -m pip install --upgrade pip
          pip install google-genai # Dùng thư viện đời mới nhất

      - name: Run Agent Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_blog.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Kiểm tra xem thư mục _drafts có tồn tại không, nếu không thì tạo
          mkdir -p _drafts
          
          git add _drafts/
          
          # Chỉ commit nếu thực sự có thay đổi
          if git diff --staged --quiet; then
            echo "Không có gì mới để cập nhật."
          else
            git commit -m "New weekly draft post"
            git push origin main
          fi
