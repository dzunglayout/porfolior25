name: Weekly Blog Agent
on:
  schedule:
    - cron: '0 0 * * 1' # Tự động chạy 0h00 sáng thứ Hai hàng tuần
  workflow_dispatch: # Cho phép bạn bấm nút chạy thủ công để thử nghiệm

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cấp quyền ghi vào repo
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Gemini Library
        run: pip install google-generativeai

      - name: Run Agent Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_blog.py

      - name: Commit and Push
        run: |
          git config --global user.name "Gemini-Agent"
          git config --global user.email "agent@google.com"
          git add _drafts/
          git commit -m "New weekly draft post" || exit 0
          git push
